<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Music Nebula v12</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root { --bg: #050505; --accent: #cc00ff; --card: #111; --sub: #888; }
        body { margin: 0; background: var(--bg); color: white; font-family: 'Segoe UI', sans-serif; padding: 15px; display: flex; flex-direction: column; align-items: center; }
        
        .glass-player { background: rgba(20, 20, 20, 0.8); backdrop-filter: blur(15px); border-radius: 35px; padding: 25px; width: 100%; max-width: 400px; border: 1px solid rgba(255,255,255,0.1); text-align: center; box-shadow: 0 25px 50px rgba(0,0,0,0.5); position: relative; overflow: hidden; }
        
        /* Анимированный фон для красоты */
        .glass-player::before { content: ''; position: absolute; top: -50%; left: -50%; width: 200%; height: 200%; background: radial-gradient(circle, rgba(204,0,255,0.1) 0%, transparent 70%); animation: rotate 10s linear infinite; z-index: -1; }
        @keyframes rotate { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

        .search-row { display: flex; gap: 10px; margin-bottom: 20px; position: relative; z-index: 2; }
        input { flex: 1; padding: 15px; border-radius: 18px; border: none; background: rgba(255,255,255,0.05); color: white; outline: none; border: 1px solid rgba(255,255,255,0.1); }
        button#sBtn { background: var(--accent); color: white; border: none; padding: 0 20px; border-radius: 18px; font-weight: bold; cursor: pointer; }

        .cover { width: 220px; height: 220px; border-radius: 30px; object-fit: cover; margin-bottom: 15px; box-shadow: 0 15px 35px rgba(204,0,255,0.3); transition: transform 0.3s; }
        .playing .cover { transform: scale(1.05); }

        .title { font-size: 1.5em; font-weight: 800; margin-bottom: 5px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .artist { color: var(--sub); font-size: 0.9em; margin-bottom: 20px; }

        /* Кастомный аудио-контроллер */
        audio { width: 100%; height: 40px; filter: invert(1) hue-rotate(270deg); margin-top: 10px; }

        #status { font-size: 0.7em; color: var(--accent); margin-top: 15px; text-transform: uppercase; font-weight: bold; letter-spacing: 2px; }

        .track-list { width: 100%; max-width: 400px; margin-top: 25px; display: flex; flex-direction: column; gap: 12px; }
        .track-item { background: var(--card); padding: 12px; border-radius: 20px; display: flex; align-items: center; gap: 15px; cursor: pointer; border: 1px solid transparent; transition: 0.3s; }
        .track-item:hover { border-color: var(--accent); background: #1a1a1a; }
        .track-item img { width: 55px; height: 55px; border-radius: 12px; }
        .ti-info { flex: 1; text-align: left; }
        .ti-t { font-weight: bold; font-size: 0.95em; }
        .ti-a { font-size: 0.8em; color: var(--sub); }
        .source-tag { font-size: 0.6em; background: #333; padding: 2px 6px; border-radius: 5px; color: #aaa; text-transform: uppercase; }
    </style>
</head>
<body>

<div class="glass-player" id="playerContainer">
    <div class="search-row">
        <input type="text" id="searchInput" placeholder="Поиск в Audius & SC...">
        <button id="sBtn">SEARCH</button>
    </div>

    <img src="https://via.placeholder.com/400?text=Nebula+v12" class="cover" id="mCover">
    <div class="title" id="mT">Ready to Fly</div>
    <div class="artist" id="mA">Audius Engine Active</div>
    
    <audio id="audioPlayer" controls></audio>
    <div id="status">Система готова</div>
</div>

<div class="track-list" id="resList"></div>

<script>
    const tg = window.Telegram.WebApp;
    tg.expand();

    // В 2026 году мы используем автоматический выбор самого быстрого узла Audius
    let audiusHost = "https://discoveryprovider.audius.co"; 

    async function initAudius() {
        try {
            const res = await fetch("https://api.audius.co");
            const data = await res.json();
            audiusHost = data.data[0]; // Берем первый живой хост
        } catch(e) { console.error("Audius host error", e); }
    }
    initAudius();

    async function searchAll(query) {
        if(!query) return;
        document.getElementById('status').innerText = "📡 СКАНИРУЮ СЕТЬ...";
        const list = document.getElementById('resList');
        list.innerHTML = '';

        try {
            // Поиск в Audius
            const aRes = await fetch(`${audiusHost}/v1/tracks/search?query=${encodeURIComponent(query)}&app_name=NebulaPlayer`);
            const aData = await aRes.json();
            
            renderTracks(aData.data, 'audius');
            document.getElementById('status').innerText = `НАЙДЕНО ${aData.data.length} ТРЕКОВ`;
        } catch(e) {
            document.getElementById('status').innerText = "❌ ОШИБКА ПОИСКА";
        }
    }

    function renderTracks(tracks, source) {
        const list = document.getElementById('resList');
        tracks.forEach(t => {
            const item = document.createElement('div');
            item.className = 'track-item';
            // У Audius обложки могут быть в разных размерах, берем 150x150 или дефолт
            const img = t.artwork ? t.artwork['150x150'] : 'https://via.placeholder.com/150?text=No+Cover';
            
            item.innerHTML = `
                <img src="${img}">
                <div class="ti-info">
                    <div class="ti-t">${t.title} <span class="source-tag">${source}</span></div>
                    <div class="ti-a">${t.user.name}</div>
                </div>
            `;
            item.onclick = () => playAudius(t);
            list.appendChild(item);
        });
    }

    function playAudius(track) {
        const player = document.getElementById('audioPlayer');
        const container = document.getElementById('playerContainer');
        
        document.getElementById('mT').innerText = track.title;
        document.getElementById('mA').innerText = track.user.name;
        document.getElementById('mCover').src = track.artwork ? track.artwork['480x480'] : 'https://via.placeholder.com/480?text=Music';
        
        // Прямая ссылка на стрим из Audius API
        const streamUrl = `${audiusHost}/v1/tracks/${track.id}/stream?app_name=NebulaPlayer`;
        
        player.src = streamUrl;
        player.play();
        
        container.classList.add('playing');
        document.getElementById('status').innerText = "СЕЙЧАС ИГРАЕТ (AUDIUS)";
        tg.HapticFeedback.notificationOccurred('success');
    }

    document.getElementById('sBtn').onclick = () => searchAll(document.getElementById('searchInput').value);
    document.getElementById('searchInput').onkeypress = (e) => { if(e.key === 'Enter') searchAll(e.target.value); };

    // Обработка паузы/плея для анимации
    const audio = document.getElementById('audioPlayer');
    audio.onplay = () => document.getElementById('playerContainer').classList.add('playing');
    audio.onpause = () => document.getElementById('playerContainer').classList.remove('playing');
</script>

</body>
</html>
