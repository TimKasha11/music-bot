<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Music Player</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body {
            margin: 0;
            background: linear-gradient(45deg, #1d1d1d, #434343);
            color: white;
            font-family: sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
        }
        .player-card {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(15px);
            border-radius: 30px;
            padding: 30px;
            width: 80%;
            text-align: center;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
        }
        .cover {
            width: 200px;
            height: 200px;
            border-radius: 20px;
            margin-bottom: 20px;
            object-fit: cover;
            box-shadow: 0 10px 20px rgba(0,0,0,0.5);
        }
        .title { font-size: 1.5em; margin: 10px 0 5px; }
        .artist { color: #ccc; margin-bottom: 20px; }
        .controls button {
            background: none;
            border: none;
            color: white;
            font-size: 2em;
            cursor: pointer;
            margin: 0 15px;
        }
        .like-btn { color: #ff4757; font-size: 1.5em; margin-top: 20px; display: block; width: 100%; }
    </style>
</head>
<body>

<div class="player-card">
    <img src="https://via.placeholder.com/200" class="cover" id="cover">
    <div class="title" id="title">Название песни</div>
    <div class="artist" id="artist">Исполнитель</div>
    
    <div class="controls">
        <button>⏮</button>
        <button id="playBtn">▶️</button>
        <button>⏭</button>
    </div>
    
    <button class="like-btn">❤️ Избранное</button>
</div>

<script>
    // Инициализация Telegram Mini App
    const tg = window.Telegram.WebApp;
    tg.expand(); // Развернуть на весь экран
</script>

</body>
</html>
