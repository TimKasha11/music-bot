<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>My Music Player</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { margin: 0; background: #000; color: white; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; }
        .player-card { background: rgba(255, 255, 255, 0.1); backdrop-filter: blur(20px); border-radius: 40px; padding: 25px; width: 85%; text-align: center; border: 1px solid rgba(255,255,255,0.1); }
        .search-box { display: flex; margin-bottom: 20px; }
        input { flex: 1; padding: 10px; border-radius: 10px; border: none; background: rgba(255,255,255,0.2); color: white; outline: none; }
        button#searchBtn { background: #3390ec; border: none; color: white; padding: 10px 15px; border-radius: 10px; margin-left: 5px; cursor: pointer; }
        .cover { width: 100%; aspect-ratio: 1/1; border-radius: 20px; object-fit: cover; margin-bottom: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .title { font-size: 1.3em; font-weight: bold; margin-bottom: 5px; }
        .artist { color: #aaa; margin-bottom: 20px; font-size: 0.9em; }
        .controls { display: flex; justify-content: center; align-items: center; gap: 20px; }
        .play-btn { background: white; color: black; border: none; width: 60px; height: 60px; border-radius: 50%; font-size: 1.5em; cursor: pointer; display: flex; align-items: center; justify-content: center; }
        .like-btn { background: none; border: none; color: #ff4757; font-size: 1.8em; margin-top: 20px; cursor: pointer; }
    </style>
</head>
<body>

<div class="player-card">
    <div class="search-box">
        <input type="text" id="searchInput" placeholder="Какую песню ищем?">
        <button id="searchBtn">🔍</button>
    </div>

    <img src="https://via.placeholder.com/300?text=Music" class="cover" id="cover">
    <div class="title" id="trackTitle">Твоя музыка</div>
    <div class="artist" id="trackArtist">Введи название выше</div>
    
    <div class="controls">
        <button class="play-btn" id="playBtn">▶️</button>
    </div>
    
    <button class="like-btn" id="likeBtn">♡</button>
</div>

<script>
    const tg = window.Telegram.WebApp;
    tg.expand();
    tg.ready();

    let audio = new Audio();
    let isPlaying = false;

    // Функция поиска
    async function search(query) {
        if (!query) return;
        const response = await fetch(`https://itunes.apple.com/search?term=${encodeURIComponent(query)}&entity=song&limit=1`);
        const data = await response.json();
        
        if (data.results.length > 0) {
            const track = data.results[0];
            document.getElementById('trackTitle').innerText = track.trackName;
            document.getElementById('trackArtist').innerText = track.artistName;
            document.getElementById('cover').src = track.artworkUrl100.replace('100x100', '600x600');
            
            audio.src = track.previewUrl;
            playMusic();
        } else {
            alert("Ничего не нашли :(");
        }
    }

    function playMusic() {
        audio.play();
        isPlaying = true;
        document.getElementById('playBtn').innerText = "⏸";
    }

    function pauseMusic() {
        audio.pause();
        isPlaying = false;
        document.getElementById('playBtn').innerText = "▶️";
    }

    // Слушатели событий
    document.getElementById('searchBtn').onclick = () => {
        search(document.getElementById('searchInput').value);
    };

    document.getElementById('playBtn').onclick = () => {
        if (isPlaying) pauseMusic(); else playMusic();
    };

    document.getElementById('likeBtn').onclick = function() {
        this.innerText = this.innerText === "♡" ? "❤️" : "♡";
        tg.HapticFeedback.impactOccurred('medium'); // Вибрация при лайке!
    };
</script>

</body>
</html>
