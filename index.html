<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>SoundCloud Mini v11</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://w.soundcloud.com/player/api.js"></script>
    <style>
        :root { --bg: #0d0d0d; --sc-orange: #ff5500; --card: #1a1a1a; }
        body { margin: 0; background: var(--bg); color: white; font-family: -apple-system, sans-serif; padding: 15px; display: flex; flex-direction: column; align-items: center; }
        
        .player-box { background: var(--card); border-radius: 25px; padding: 20px; width: 100%; max-width: 400px; box-sizing: border-box; box-shadow: 0 10px 30px rgba(255,85,0,0.1); border: 1px solid #333; }
        
        .search-row { display: flex; gap: 8px; margin-bottom: 20px; }
        input { flex: 1; padding: 12px; border-radius: 12px; border: 1px solid #444; background: #000; color: white; outline: none; }
        button { background: var(--sc-orange); color: white; border: none; padding: 10px 15px; border-radius: 12px; font-weight: bold; cursor: pointer; }

        /* Контейнер для виджета */
        .sc-container { width: 100%; height: 166px; border-radius: 15px; overflow: hidden; background: #000; margin-bottom: 15px; border: 1px solid #333; }
        iframe { width: 100%; border: none; }

        .status { font-size: 0.8em; color: #888; text-align: center; margin-top: 10px; }
        .hint { font-size: 0.7em; color: #555; margin-top: 15px; text-align: center; line-height: 1.4; }
        
        .popular-list { width: 100%; max-width: 400px; margin-top: 20px; }
        .tag { display: inline-block; background: #222; padding: 8px 12px; border-radius: 20px; font-size: 0.8em; margin: 4px; cursor: pointer; border: 1px solid #333; }
        .tag:active { background: var(--sc-orange); }
    </style>
</head>
<body>

<div class="player-box">
    <div class="search-row">
        <input type="text" id="urlInput" placeholder="Ссылка на трек или поиск...">
        <button id="loadBtn">PLAY</button>
    </div>

    <div class="sc-container" id="player-area">
        <iframe id="sc-widget" src="https://w.soundcloud.com/player/?url=https://soundcloud.com/discover/sets/charts-top:all-music&color=%23ff5500&auto_play=false&hide_related=true&show_comments=false&show_user=true&show_reposts=false&show_teaser=false" scrolling="no" frameborder="no" allow="autoplay"></iframe>
    </div>

    <div class="status" id="statusText">Готов к музыке</div>
</div>

<div class="popular-list">
    <div class="tag" onclick="loadByGenre('pop')">🔥 Поп</div>
    <div class="tag" onclick="loadByGenre('rock')">🤘 Рок</div>
    <div class="tag" onclick="loadByGenre('techno')">🎹 Техно</div>
    <div class="tag" onclick="loadByGenre('lofi')">☕ Лоу-фай</div>
</div>

<div class="hint">
    Совет: Просто вставь ссылку на любой трек SoundCloud, чтобы включить его.
</div>

<script>
    const tg = window.Telegram.WebApp;
    tg.expand();
    
    const widgetIframe = document.getElementById('sc-widget');
    const widget = SC.Widget(widgetIframe);
    const status = document.getElementById('statusText');

    // Когда виджет готов
    widget.bind(SC.Widget.Events.READY, () => {
        status.innerText = "Плеер готов";
    });

    // Когда начинается воспроизведение
    widget.bind(SC.Widget.Events.PLAY, () => {
        status.innerText = "Сейчас играет";
        tg.HapticFeedback.impactOccurred('light');
    });

    function loadTrack() {
        let input = document.getElementById('urlInput').value;
        if(!input) return;

        let trackUrl = input;

        // Если это не ссылка, попробуем "поиск" (через перенаправление на мобильный поиск SC)
        if(!input.includes('soundcloud.com')) {
            status.innerText = "Поиск трека...";
            // В 2026 году мы используем oEmbed поиск
            trackUrl = `https://soundcloud.com/search?q=${encodeURIComponent(input)}`;
        }

        status.innerText = "Загрузка потока...";
        
        // Магия загрузки нового трека в виджет
        widget.load(trackUrl, {
            color: "#ff5500",
            auto_play: true,
            hide_related: true,
            show_comments: false
        });
    }

    function loadByGenre(genre) {
        const genres = {
            'pop': 'https://soundcloud.com/discover/sets/charts-top:pop',
            'rock': 'https://soundcloud.com/discover/sets/charts-top:rock',
            'techno': 'https://soundcloud.com/discover/sets/charts-top:techno',
            'lofi': 'https://soundcloud.com/discover/sets/track-of-the-day:chill'
        };
        widget.load(genres[genre], { auto_play: true });
        status.innerText = "Загрузка жанра: " + genre;
    }

    document.getElementById('loadBtn').onclick = loadTrack;
    
    // Обработка Enter
    document.getElementById('urlInput').onkeypress = (e) => {
        if(e.key === 'Enter') loadTrack();
    };
</script>

</body>
</html>
