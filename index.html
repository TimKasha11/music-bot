<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Music 2026 Final</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root { --bg: #05070a; --accent: #00ffaa; --card: #111827; }
        body { margin: 0; background: var(--bg); color: white; font-family: -apple-system, sans-serif; padding: 15px; display: flex; flex-direction: column; align-items: center; }
        
        .main-card { background: var(--card); border-radius: 28px; padding: 20px; width: 100%; max-width: 400px; box-sizing: border-box; border: 1px solid #1f2937; box-shadow: 0 15px 35px rgba(0,0,0,0.5); }
        
        /* Ключевое изменение: Официальный плеер без ограничений */
        .video-wrapper { width: 100%; height: 210px; border-radius: 20px; overflow: hidden; background: #000; margin-bottom: 15px; position: relative; }
        #player-iframe { width: 100%; height: 100%; border: none; }

        .search-area { display: flex; gap: 8px; margin-bottom: 15px; }
        input { flex: 1; padding: 14px; border-radius: 14px; border: 1px solid #374151; background: #05070a; color: white; outline: none; font-size: 16px; }
        button#sBtn { background: var(--accent); color: black; border: none; padding: 10px 18px; border-radius: 14px; font-weight: bold; cursor: pointer; }

        .info { margin-bottom: 20px; text-align: center; }
        .t { font-size: 1.25em; font-weight: 800; margin-bottom: 4px; display: block; }
        .a { color: var(--accent); font-size: 0.95em; cursor: pointer; opacity: 0.9; }
        
        #status-msg { font-size: 0.75em; color: #6b7280; margin: 10px 0; }

        .results { width: 100%; max-width: 400px; display: flex; flex-direction: column; gap: 10px; margin-top: 10px; }
        .item { background: #111827; padding: 12px; border-radius: 16px; display: flex; align-items: center; gap: 12px; cursor: pointer; border: 1px solid transparent; transition: 0.2s; }
        .item:active { background: #1f2937; border-color: var(--accent); }
        .item img { width: 44px; height: 44px; border-radius: 8px; }
        .item-text { flex: 1; overflow: hidden; }
        .item-title { font-weight: 600; font-size: 0.9em; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .item-artist { font-size: 0.75em; color: #9ca3af; }
    </style>
</head>
<body>

<div class="main-card">
    <div class="search-area">
        <input type="text" id="sInp" placeholder="Название или артист...">
        <button id="sBtn">🔍</button>
    </div>

    <div class="video-wrapper">
        <iframe id="player-iframe" src="" allow="autoplay; encrypted-media" allowfullscreen></iframe>
    </div>

    <div class="info">
        <span class="t" id="curT">Готов к музыке</span>
        <span class="a" id="curA" onclick="artistSearch()">Найди что-нибудь</span>
    </div>
    <div id="status-msg">Введите запрос для поиска...</div>
</div>

<div class="results" id="resList"></div>

<script>
    const tg = window.Telegram.WebApp;
    tg.expand();

    // Список актуальных поисковых узлов на 2026 год
    const SEARCH_NODES = [
        "https://pipedapi.kavin.rocks",
        "https://api.piped.yt",
        "https://piped-api.lunar.icu",
        "https://inv.tux.digital"
    ];

    async function search(query) {
        if(!query) return;
        document.getElementById('status-msg').innerText = "Поиск вариантов...";
        try {
            const res = await fetch(`https://itunes.apple.com/search?term=${encodeURIComponent(query)}&entity=song&limit=10`);
            const data = await res.json();
            render(data.results);
            document.getElementById('status-msg').innerText = "Выберите трек из списка";
        } catch(e) { 
            document.getElementById('status-msg').innerText = "Ошибка сети. Проверьте интернет."; 
        }
    }

    function render(tracks) {
        const list = document.getElementById('resList');
        list.innerHTML = '';
        tracks.forEach(t => {
            const d = document.createElement('div');
            d.className = 'item';
            d.innerHTML = `
                <img src="${t.artworkUrl100}">
                <div class="item-text">
                    <div class="item-title">${t.trackName}</div>
                    <div class="item-artist">${t.artistName}</div>
                </div>
            `;
            d.onclick = () => play(t.trackName, t.artistName);
            list.appendChild(d);
        });
    }

    async function play(title, artist) {
        document.getElementById('curT').innerText = title;
        document.getElementById('curA').innerText = artist;
        document.getElementById('status-msg').innerText = "Связь с YouTube...";
        tg.HapticFeedback.impactOccurred('medium');

        let vId = null;
        const q = `${artist} ${title} audio`;

        // Перебор серверов для поиска ID
        for(let node of SEARCH_NODES) {
            try {
                const r = await fetch(`${node}/search?q=${encodeURIComponent(q)}&filter=music_songs`);
                const d = await r.json();
                if(d.items && d.items[0]) {
                    vId = d.items[0].url.split('v=')[1];
                    break;
                }
            } catch(e) { continue; }
        }

        if(vId) {
            // Прямая загрузка через официальный Embed URL (самый стабильный метод)
            const embedUrl = `https://www.youtube.com/embed/${vId}?autoplay=1&rel=0&modestbranding=1`;
            document.getElementById('player-iframe').src = embedUrl;
            document.getElementById('status-msg').innerText = "Сейчас играет";
        } else {
            document.getElementById('status-msg').innerText = "Видео не найдено. Попробуйте другой трек.";
        }
    }

    function artistSearch() {
        const a = document.getElementById('curA').innerText;
        if(a !== "Найди что-нибудь") {
            document.getElementById('sInp').value = a;
            search(a);
        }
    }

    document.getElementById('sBtn').onclick = () => search(document.getElementById('sInp').value);
    document.getElementById('sInp').onkeypress = (e) => { if(e.key==='Enter') search(e.target.value); };
</script>
</body>
</html>
