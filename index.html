<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Music Cloud Ultra v5</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://www.youtube.com/iframe_api"></script>
    <style>
        :root { --accent: #ff0055; --bg: #050505; --card: rgba(255, 255, 255, 0.05); }
        body { margin: 0; background: var(--bg); color: white; font-family: -apple-system, sans-serif; padding: 15px; display: flex; flex-direction: column; align-items: center; min-height: 100vh; overflow-x: hidden; }
        .player-card { background: var(--card); backdrop-filter: blur(30px); border-radius: 30px; padding: 25px; width: 100%; max-width: 400px; text-align: center; border: 1px solid rgba(255,255,255,0.1); margin-bottom: 20px; box-shadow: 0 20px 50px rgba(0,0,0,0.8); }
        .search-box { display: flex; gap: 10px; margin-bottom: 20px; }
        input { flex: 1; padding: 14px; border-radius: 15px; border: none; background: rgba(255,255,255,0.1); color: white; outline: none; font-size: 16px; }
        button#searchBtn { background: var(--accent); border: none; color: white; padding: 10px 20px; border-radius: 15px; cursor: pointer; font-size: 18px; }
        .cover { width: 180px; height: 180px; border-radius: 25px; object-fit: cover; margin-bottom: 15px; box-shadow: 0 10px 30px rgba(255,0,85,0.3); }
        .title { font-size: 1.4em; font-weight: bold; margin: 5px 0; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .artist { color: var(--accent); cursor: pointer; font-weight: 500; text-decoration: underline; margin-bottom: 15px; display: inline-block; }
        #status { font-size: 0.8em; color: #00ffcc; margin-bottom: 15px; font-weight: 500; }
        .controls { display: flex; justify-content: center; align-items: center; gap: 30px; }
        .play-btn { background: white; color: black; border: none; width: 60px; height: 60px; border-radius: 50%; font-size: 1.6em; cursor: pointer; display: flex; align-items: center; justify-content: center; }
        
        #yt-player { position: absolute; top: -1000px; left: -1000px; visibility: hidden; } /* Прячем плеер */

        .section-header { width: 100%; max-width: 400px; font-size: 0.9em; margin: 20px 0 10px; color: #666; text-transform: uppercase; font-weight: 800; letter-spacing: 1px; }
        .list-container { width: 100%; max-width: 400px; display: flex; flex-direction: column; gap: 10px; padding-bottom: 40px; }
        .track-item { background: var(--card); padding: 12px; border-radius: 20px; display: flex; align-items: center; gap: 15px; cursor: pointer; transition: 0.3s; }
        .track-item:active { transform: scale(0.96); background: rgba(255,255,255,0.1); }
        .track-item img { width: 55px; height: 55px; border-radius: 12px; object-fit: cover; }
        .track-info { flex: 1; overflow: hidden; text-align: left; }
        .track-name { font-weight: bold; font-size: 1em; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .track-sub { font-size: 0.85em; color: #888; }
    </style>
</head>
<body>

<div id="yt-player"></div>

<div class="player-card">
    <div class="search-box">
        <input type="text" id="searchInput" placeholder="Поиск музыки...">
        <button id="searchBtn">🔍</button>
    </div>
    <img src="https://images.unsplash.com/photo-1470225620780-dba8ba36b745?w=400" class="cover" id="cover">
    <div class="title" id="trackTitle">Ultra Player</div>
    <div class="artist" id="trackArtist" onclick="searchArtistDirectly()">Выбери трек</div>
    <div id="status"></div>
    <div class="controls">
        <button class="play-btn" id="playBtn">▶️</button>
        <button style="background:none; border:none; color:#ff0055; font-size:2em; cursor:pointer;" id="likeBtn">♡</button>
    </div>
</div>

<div class="section-header" id="resHeader" style="display:none;">Найдено в сети</div>
<div class="list-container" id="searchList"></div>

<div class="section-header">Избранное</div>
<div class="list-container" id="favList"></div>

<div class="section-header">Рекомендации</div>
<div class="list-container" id="recList"></div>

<script>
    const LFM_KEY = "13cce53ddc5788a1994e9119f85a9895";
    const tg = window.Telegram.WebApp;
    tg.expand();

    let player;
    let isPlaying = false;
    let currentTrack = null;
    let favorites = [];

    // Инициализация YT
    function onYouTubeIframeAPIReady() {
        player = new YT.Player('yt-player', {
            height: '200', width: '200',
            playerVars: { 'autoplay': 1, 'controls': 0, 'disablekb': 1 },
            events: { 'onStateChange': onPlayerStateChange, 'onError': onPlayerError }
        });
    }

    tg.CloudStorage.getItem('my_music_favs', (err, val) => {
        if(!err && val) { favorites = JSON.parse(val); renderList(favorites, 'favList'); }
    });

    async function findTracks(query) {
        if (!query) return;
        document.getElementById('status').innerText = "Ищем...";
        try {
            const res = await fetch(`https://itunes.apple.com/search?term=${encodeURIComponent(query)}&entity=song&limit=10`);
            const data = await res.json();
            document.getElementById('resHeader').style.display = 'block';
            renderList(data.results.map(t => ({
                id: t.trackId, title: t.trackName, artist: t.artistName,
                cover: t.artworkUrl100.replace('100x100', '600x600')
            })), 'searchList');
            document.getElementById('status').innerText = "";
        } catch(e) { document.getElementById('status').innerText = "Ошибка сети"; }
    }

    function renderList(tracks, containerId) {
        const container = document.getElementById(containerId);
        container.innerHTML = '';
        tracks.forEach(t => {
            const item = document.createElement('div');
            item.className = 'track-item';
            item.innerHTML = `<img src="${t.cover}"><div class="track-info"><div class="track-name">${t.title}</div><div class="track-sub">${t.artist}</div></div>`;
            item.onclick = () => loadTrack(t);
            container.appendChild(item);
        });
    }

    function loadTrack(track) {
        currentTrack = track;
        document.getElementById('trackTitle').innerText = track.title;
        document.getElementById('trackArtist').innerText = track.artist;
        document.getElementById('cover').src = track.cover;
        document.getElementById('likeBtn').innerText = favorites.some(f => f.id === track.id) ? "❤️" : "♡";
        document.getElementById('status').innerText = "Синхронизация с YouTube...";
        document.getElementById('playBtn').innerText = "⏳";

        // ХИТРЫЙ МЕТОД: Используем поиск через плейлист YouTube
        // Он найдет видео по названию и артисту автоматически
        const searchTerm = `${track.artist} ${track.title} music`;
        player.loadPlaylist({
            listType: 'search',
            list: searchTerm,
            index: 0,
            suggestedQuality: 'small'
        });
        
        isPlaying = true;
        document.getElementById('playBtn').innerText = "⏸";
        fetchRecs(track.title, track.artist);
    }

    function onPlayerStateChange(event) {
        if (event.data == YT.PlayerState.PLAYING) {
            document.getElementById('status').innerText = "Сейчас играет";
            document.getElementById('playBtn').innerText = "⏸";
        }
        if (event.data == YT.PlayerState.ENDED) {
            isPlaying = false;
            document.getElementById('playBtn').innerText = "▶️";
        }
    }

    function onPlayerError() {
        document.getElementById('status').innerText = "Ошибка поиска. Попробуй другой трек.";
    }

    async function fetchRecs(title, artist) {
        try {
            const res = await fetch(`https://ws.audioscrobbler.com/2.0/?method=track.getsimilar&artist=${encodeURIComponent(artist)}&track=${encodeURIComponent(title)}&api_key=${LFM_KEY}&format=json&limit=6`);
            const data = await res.json();
            if(data.similartracks?.track) {
                renderList(data.similartracks.track.map(t => ({
                    id: Math.random(), title: t.name, artist: t.artist.name, cover: 'https://via.placeholder.com/200?text=Song'
                })), 'recList');
            }
        } catch(e) {}
    }

    document.getElementById('searchBtn').onclick = () => findTracks(document.getElementById('searchInput').value);
    
    document.getElementById('playBtn').onclick = () => {
        if(isPlaying) { player.pauseVideo(); document.getElementById('playBtn').innerText = "▶️"; }
        else { player.playVideo(); document.getElementById('playBtn').innerText = "⏸"; }
        isPlaying = !isPlaying;
    };

    document.getElementById('likeBtn').onclick = () => {
        if(!currentTrack) return;
        const idx = favorites.findIndex(f => f.id === currentTrack.id);
        if(idx === -1) favorites.unshift(currentTrack);
        else favorites.splice(idx, 1);
        tg.CloudStorage.setItem('my_music_favs', JSON.stringify(favorites));
        renderList(favorites, 'favList');
        document.getElementById('likeBtn').innerText = idx === -1 ? "❤️" : "♡";
    };

    function searchArtistDirectly() {
        const art = document.getElementById('trackArtist').innerText;
        if(art !== "Выбери трек") { document.getElementById('searchInput').value = art; findTracks(art); }
    }
</script>
</body>
</html>
