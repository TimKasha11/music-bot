<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Music Hydra v10</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root { --bg: #080808; --accent: #00ff88; --card: #121212; --text: #e0e0e0; }
        body { margin: 0; background: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; padding: 15px; display: flex; flex-direction: column; align-items: center; }
        
        .player-card { background: var(--card); border-radius: 30px; padding: 25px; width: 100%; max-width: 380px; text-align: center; border: 1px solid #222; box-shadow: 0 20px 50px rgba(0,255,136,0.1); position: sticky; top: 10px; z-index: 10; }
        
        .search-bar { display: flex; gap: 10px; margin-bottom: 20px; }
        input { flex: 1; padding: 12px 18px; border-radius: 15px; border: 1px solid #333; background: #000; color: white; outline: none; transition: 0.3s; }
        input:focus { border-color: var(--accent); }
        button#sBtn { background: var(--accent); color: black; border: none; padding: 0 20px; border-radius: 15px; font-weight: 900; cursor: pointer; }

        .track-cover { width: 180px; height: 180px; border-radius: 20px; object-fit: cover; margin-bottom: 15px; background: #1a1a1a; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .track-title { font-size: 1.3em; font-weight: 800; margin-bottom: 4px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .track-artist { color: var(--accent); font-size: 0.9em; margin-bottom: 20px; opacity: 0.8; }

        audio { width: 100%; height: 45px; filter: invert(1); border-radius: 10px; }
        
        #status { font-size: 0.75em; color: #888; margin-top: 15px; text-transform: uppercase; letter-spacing: 1px; }

        .track-list { width: 100%; max-width: 380px; margin-top: 20px; display: flex; flex-direction: column; gap: 10px; }
        .track-item { background: var(--card); padding: 10px; border-radius: 18px; display: flex; align-items: center; gap: 12px; cursor: pointer; border: 1px solid transparent; transition: 0.2s; }
        .track-item:active { background: #1a1a1a; transform: scale(0.98); }
        .track-item img { width: 50px; height: 50px; border-radius: 10px; }
        .ti-info { flex: 1; text-align: left; overflow: hidden; }
        .ti-name { font-weight: bold; font-size: 0.9em; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .ti-art { font-size: 0.8em; color: #666; }
    </style>
</head>
<body>

<div class="player-card">
    <div class="search-bar">
        <input type="text" id="sInp" placeholder="Трек, артист, альбом...">
        <button id="sBtn">GO</button>
    </div>

    <img src="https://via.placeholder.com/300?text=HYDRA+v10" class="track-cover" id="mCover">
    <div class="track-title" id="mT">Hydra Engine</div>
    <div class="track-artist" id="mA">Ready to stream</div>
    
    <audio id="audio" controls></audio>
    <div id="status">Ожидание...</div>
</div>

<div class="track-list" id="resList"></div>

<script>
    const tg = window.Telegram.WebApp;
    tg.expand();

    // Самые надежные инстансы на 2026 год (периодически обновляй этот список)
    const NODES = [
        "https://pipedapi.kavin.rocks",
        "https://api.piped.yt",
        "https://piped-api.lunar.icu",
        "https://inv.tux.digital",
        "https://invidious.snopyta.org"
    ];

    let currentTrack = null;

    async function search(q) {
        if(!q) return;
        document.getElementById('status').innerText = "⚡ Поиск в базе...";
        try {
            const r = await fetch(`https://itunes.apple.com/search?term=${encodeURIComponent(q)}&entity=song&limit=12`);
            const d = await r.json();
            render(d.results);
            document.getElementById('status').innerText = "Найдено " + d.results.length + " треков";
        } catch(e) { document.getElementById('status').innerText = "❌ Ошибка iTunes"; }
    }

    function render(tracks) {
        const l = document.getElementById('resList');
        l.innerHTML = '';
        tracks.forEach(t => {
            const item = document.createElement('div');
            item.className = 'track-item';
            item.innerHTML = `
                <img src="${t.artworkUrl100}">
                <div class="ti-info">
                    <div class="ti-name">${t.trackName}</div>
                    <div class="ti-art">${t.artistName}</div>
                </div>
            `;
            item.onclick = () => getStream(t);
            l.appendChild(item);
        });
    }

    async function getStream(t) {
        currentTrack = t;
        document.getElementById('mT').innerText = t.trackName;
        document.getElementById('mA').innerText = t.artistName;
        document.getElementById('mCover').src = t.artworkUrl100.replace('100x100', '600x600');
        document.getElementById('status').innerText = "🔗 Извлечение потока...";
        tg.HapticFeedback.selectionChanged();

        const q = `${t.artistName} ${t.trackName} audio`;
        let success = false;

        // Перебор нод (Головы Гидры)
        for(let node of NODES) {
            try {
                document.getElementById('status').innerText = `📡 Пробую сервер: ${new URL(node).hostname}`;
                
                // 1. Поиск ID видео
                const sRes = await fetch(`${node}/search?q=${encodeURIComponent(q)}&filter=music_songs`);
                const sData = await sRes.json();
                const vId = sData.items[0].url.split('v=')[1];

                // 2. Получение прямой ссылки на аудио (как делает yt-dlp)
                const streamRes = await fetch(`${node}/streams/${vId}`);
                const streamData = await streamRes.json();
                
                // Ищем аудио-поток (m4a или opus)
                const audioStream = streamData.audioStreams.find(s => s.mimeType.includes('audio/mp4')) || streamData.audioStreams[0];

                if(audioStream && audioStream.url) {
                    const player = document.getElementById('audio');
                    player.src = audioStream.url;
                    player.play();
                    document.getElementById('status').innerText = "✅ Играет через " + new URL(node).hostname;
                    success = true;
                    break;
                }
            } catch(e) {
                console.warn(`Сервер ${node} не справился, идем дальше...`);
            }
        }

        if(!success) {
            document.getElementById('status').innerText = "💀 Все сервера YouTube 2026 заблокированы. Попробуй позже.";
        }
    }

    document.getElementById('sBtn').onclick = () => search(document.getElementById('sInp').value);
    document.getElementById('sInp').onkeypress = (e) => { if(e.key==='Enter') search(e.target.value); };
</script>
</body>
</html>
