<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Music Cloud PRO (yt-dlp Engine)</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root { --bg: #0a0b10; --accent: #7d5fff; --card: #161720; }
        body { margin: 0; background: var(--bg); color: white; font-family: -apple-system, sans-serif; padding: 15px; display: flex; flex-direction: column; align-items: center; }
        
        .player-ui { background: var(--card); border-radius: 32px; padding: 25px; width: 100%; max-width: 400px; text-align: center; border: 1px solid #252630; box-shadow: 0 20px 40px rgba(0,0,0,0.6); }
        
        .search-row { display: flex; gap: 10px; margin-bottom: 20px; }
        input { flex: 1; padding: 14px; border-radius: 16px; border: none; background: #0a0b10; color: white; outline: none; border: 1px solid #252630; }
        button#sBtn { background: var(--accent); color: white; border: none; padding: 0 20px; border-radius: 16px; cursor: pointer; font-weight: bold; }

        .cover-art { width: 200px; height: 200px; border-radius: 24px; object-fit: cover; margin-bottom: 15px; box-shadow: 0 10px 30px rgba(125, 95, 255, 0.3); background: #252630; }
        .track-name { font-size: 1.4em; font-weight: bold; margin-bottom: 5px; }
        .track-artist { color: #888; margin-bottom: 20px; }

        /* Кастомный аудио-контроллер */
        audio { width: 100%; height: 40px; margin-top: 10px; border-radius: 10px; filter: invert(100%); }

        #status { font-size: 0.8em; color: var(--accent); margin: 15px 0; min-height: 1.2em; font-weight: 500; }

        .list { width: 100%; max-width: 400px; margin-top: 20px; display: flex; flex-direction: column; gap: 10px; }
        .item { background: var(--card); padding: 12px; border-radius: 18px; display: flex; align-items: center; gap: 12px; cursor: pointer; transition: 0.2s; border: 1px solid transparent; }
        .item:active { background: #252630; border-color: var(--accent); }
        .item img { width: 50px; height: 50px; border-radius: 10px; }
        .item-info { text-align: left; overflow: hidden; }
        .item-t { font-weight: bold; font-size: 0.95em; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .item-a { font-size: 0.8em; color: #888; }
    </style>
</head>
<body>

<div class="player-ui">
    <div class="search-row">
        <input type="text" id="sInp" placeholder="Трек или артист...">
        <button id="sBtn">🔍</button>
    </div>

    <img src="https://via.placeholder.com/400?text=Music+2026" class="cover-art" id="mainCover">
    <div class="track-name" id="mainT">Music Cloud</div>
    <div class="track-artist" id="mainA">v9.0 Engine</div>
    
    <div id="status">Жду твой любимый трек...</div>
    
    <audio id="audioPlayer" controls></audio>
</div>

<div class="list" id="resList"></div>

<script>
    const tg = window.Telegram.WebApp;
    tg.expand();

    // Мы используем Cobalt API — это облачный yt-dlp
    const COBALT_API = "https://api.cobalt.tools/api/json";
    const PIPED_API = "https://pipedapi.kavin.rocks";

    async function searchMusic(q) {
        if(!q) return;
        document.getElementById('status').innerText = "🔎 Ищу метаданные...";
        try {
            const r = await fetch(`https://itunes.apple.com/search?term=${encodeURIComponent(q)}&entity=song&limit=10`);
            const data = await r.json();
            renderList(data.results);
            document.getElementById('status').innerText = "Выбери песню из списка ниже";
        } catch(e) { 
            document.getElementById('status').innerText = "❌ Ошибка поиска"; 
        }
    }

    function renderList(tracks) {
        const list = document.getElementById('resList');
        list.innerHTML = '';
        tracks.forEach(t => {
            const d = document.createElement('div');
            d.className = 'item';
            d.innerHTML = `
                <img src="${t.artworkUrl100}">
                <div class="item-info">
                    <div class="item-t">${t.trackName}</div>
                    <div class="item-a">${t.artistName}</div>
                </div>
            `;
            d.onclick = () => getDirectLink(t);
            list.appendChild(d);
        });
    }

    async function getDirectLink(track) {
        document.getElementById('mainT').innerText = track.trackName;
        document.getElementById('mainA').innerText = track.artistName;
        document.getElementById('mainCover').src = track.artworkUrl100.replace('100x100', '600x600');
        document.getElementById('status').innerText = "🚀 yt-dlp подготавливает поток...";
        tg.HapticFeedback.impactOccurred('medium');

        try {
            // 1. Находим видео на YouTube
            const sQuery = `${track.artistName} ${track.trackName} audio`;
            const sRes = await fetch(`${PIPED_API}/search?q=${encodeURIComponent(sQuery)}&filter=music_songs`);
            const sData = await sRes.json();
            const videoUrl = "https://www.youtube.com/watch?v=" + sData.items[0].url.split('v=')[1];

            // 2. Запрашиваем прямую ссылку у Cobalt (Cloud yt-dlp)
            const cRes = await fetch(COBALT_API, {
                method: "POST",
                headers: { "Content-Type": "application/json", "Accept": "application/json" },
                body: JSON.stringify({
                    url: videoUrl,
                    downloadMode: "audio",
                    audioFormat: "mp3",
                    audioBitrate: "128"
                })
            });
            const cData = await cRes.json();

            if(cData.url) {
                const audio = document.getElementById('audioPlayer');
                audio.src = cData.url;
                audio.play();
                document.getElementById('status').innerText = "✅ Наслаждайся музыкой!";
            } else {
                throw new Error();
            }

        } catch(e) {
            document.getElementById('status').innerText = "⚠️ Ошибка потока. Попробуй другой трек.";
        }
    }

    document.getElementById('sBtn').onclick = () => searchMusic(document.getElementById('sInp').value);
    document.getElementById('sInp').onkeypress = (e) => { if(e.key==='Enter') searchMusic(e.target.value); };
</script>
</body>
</html>
